<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#FBFAF6" />
    <meta name="color-scheme" content="light" />

    <!-- Fonts: preconnect + non-blocking load with a graceful fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Primary meta -->
    <title>MD. Rabiul Islam & Associates | Supreme Court of Bangladesh</title>
    <meta
      name="description"
      content="Strategic legal counsel in constitutional, corporate, civil and criminal matters before the Supreme Court of Bangladesh."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="MD. Rabiul Islam & Associates" />
    <link rel="canonical" href="https://rabiul-demo.rupam.uk/" />

    <!-- Default Open Graph / Twitter (overridden per-route at runtime). These
         static tags are what non-JS social scrapers read; keep them complete. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MD. Rabiul Islam & Associates" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:title"
      content="MD. Rabiul Islam & Associates | Supreme Court of Bangladesh"
    />
    <meta
      property="og:description"
      content="Strategic legal counsel in constitutional, corporate, civil and criminal matters before the Supreme Court of Bangladesh."
    />
    <meta property="og:url" content="https://rabiul-demo.rupam.uk/" />
    <meta property="og:image" content="https://rabiul-demo.rupam.uk/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MD. Rabiul Islam & Associates | Supreme Court of Bangladesh"
    />
    <meta
      name="twitter:description"
      content="Strategic legal counsel in constitutional, corporate, civil and criminal matters before the Supreme Court of Bangladesh."
    />
    <meta name="twitter:image" content="https://rabiul-demo.rupam.uk/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
